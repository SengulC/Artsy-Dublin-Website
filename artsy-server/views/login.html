<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Artsy Dublin</title>
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #f4f4f9;
      }
      .login-container {
        width: 350px;
        padding: 2rem;
        background: white;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        text-align: center;
      }
      h2 {
        color: #333;
        margin-bottom: 1.5rem;
      }
      input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
      }
      button {
        width: 100%;
        padding: 12px;
        background-color: grey;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
        margin-top: 10px;
      }
      button:hover {
        background-color: #69a6e6;
      }
      .error-msg {
        color: red;
        font-size: 14px;
        margin-top: 10px;
        display: none;
      }
      .footer-link {
        margin-top: 20px;
        font-size: 14px;
      }
      .footer-link a {
        color: grey;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <h2>Login</h2>
      <form id="loginForm">
        <input type="email" id="email" placeholder="Email" required />
        <input type="password" id="password" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>
      <p id="errorBox" class="error-msg"></p>

      <div class="footer-link">
        Don't have an account? <a href="/register">Register here</a>
      </div>
    </div>

    <script>
      const loginForm = document.getElementById("loginForm");
      const errorBox = document.getElementById("errorBox");

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        errorBox.style.display = "none";

        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        try {
          const response = await fetch("/users/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });

          const data = await response.json();

          if (response.ok) {
            localStorage.setItem("token", data.token);
            alert("Login successful!");

            window.location.href = "userstate";
          } else {
            errorBox.innerText = data.message || "Login failed";
            errorBox.style.display = "block";
          }
        } catch (error) {
          console.error("Error:", error);
          errorBox.innerText = "Server error, please try again later.";
          errorBox.style.display = "block";
        }
      });
    </script>
  </body>
</html>
